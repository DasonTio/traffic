camera_id: tol_fixed_cctv_001

video:
  default: youtube
  youtube: https://www.youtube.com/watch?v=wWSSUfL2LpE
  local: .video/video.mp4.mp4
  resolution: 360p
  fps: 30.0

model:
  weights: yolo11m.pt
  confidence: 0.30
  detect_classes: [2, 5, 7]

tracking:
  tracker_config: ocsort.yaml

classification:
  enabled: true
  vote_decay: 0.9
  min_conf_weight: 0.25
  switch_margin: 1.1
  min_switch_frames: 3
  score_floor: 0.01

output:
  run_root: runs
  dataset_dir: dataset

coco_names:
  2: Car
  3: Motorcycle
  5: Bus
  7: Truck

homography:
  src_points:
    - [60, 339]
    - [425, 339]
    - [306, 188]
    - [173, 188]
  dst_points:
    - [120, 340]
    - [360, 340]
    - [360, 40]
    - [120, 40]

lanes:
  - id: fast_lane_1
    label: Fast Lane 1
    category: fast
    direction: [0.45, -0.89]  # bottom → top (upward in BEV)
    polygon:
      - [116, 303]
      - [152, 261]
      - [194, 217]
      - [219, 197]
      - [252, 195]
      - [241, 217]
      - [234, 239]
      - [222, 285]
      - [212, 327]
      - [106, 321]
  - id: fast_lane_2
    label: Fast Lane 2
    category: fast
    direction: [0.45, 0.89]   # top → bottom (downward in BEV)
    polygon:
      - [278, 193]
      - [315, 193]
      - [332, 221]
      - [350, 257]
      - [368, 284]
      - [395, 324]
      - [404, 338]
      - [285, 339]
      - [280, 295]
      - [277, 248]
      - [277, 219]
  - id: emergency_lane_1
    label: Emergency 1
    category: emergency
    direction: [0.48, -0.87]  # same flow as fast_lane_1 (bottom → top)
    polygon:
      - [4, 199]
      - [51, 180]
      - [120, 167]
      - [152, 188]
      - [113, 203]
      - [70, 225]
      - [37, 239]
      - [3, 256]
  - id: emergency_lane_2
    label: Emergency 2
    category: emergency
    direction: [0.52, 0.85]
    polygon:
      - [382, 181]
      - [425, 206]
      - [462, 221]
      - [479, 220]
      - [479, 178]
      - [434, 163]
      - [405, 156]
      - [382, 147]

class_lane_policy:
  Car:
    forbidden_lanes: []
  Bus:
    forbidden_lanes: [fast_lane_1, fast_lane_2]
  Truck:
    forbidden_lanes: [fast_lane_1, fast_lane_2]

ganomaly:
  image_size: 64
  aggregation_window: 20
  ema_alpha: 0.3
  default_threshold: 0.02
  checkpoints:
    car: models/ganomaly_car.pt
    bus: models/ganomaly_bus.pt
    truck: models/ganomaly_truck.pt

vae:
  image_size: 64
  latent_dim: 96
  beta: 1.0
  default_threshold: 0.02
  checkpoints:
    car: models/vae_car.pt
    bus: models/vae_bus.pt
    truck: models/vae_truck.pt

thresholds:
  fps_fallback: 30.0
  smoothing_window: 5
  min_sequence_frames: 16
  # Rule enable/disable flags
  lane_violation_enabled: true
  wrong_way_enabled: true
  stopped_vehicle_enabled: false    # 7.7% precision — mostly YOLO jitter on distant objects
  sudden_stop_enabled: false        # 3.4% precision — same root cause as stopped_vehicle
  # Rule thresholds
  lane_violation_seconds: 0.5
  wrong_way_seconds: 2.0
  stopped_vehicle_seconds: 2.0
  sudden_stop_window_seconds: 1.5
  stopped_speed_threshold: 2.5
  motion_floor: 8.0
  wrong_way_alignment_threshold: -0.5
  sudden_stop_delta: 6.0
  congestion_slow_ratio: 0.65
  congestion_min_active_tracks: 3
  ganomaly_high_threshold: 3.5
  event_gap_frames: 5
  min_track_age_frames: 15

enhancement:
  enabled: false
  clahe_enabled: true
  clahe_clip_limit: 2.0
  clahe_tile_size: 8
  denoise_enabled: false
  denoise_strength: 6
  sharpen_enabled: true
  sharpen_amount: 0.5
